wildcard_paths:
  - metadata.name
  - metadata.namespace
  - metadata.labels.app
  - metadata.labels.tier
  - metadata.labels.environment
  - metadata.annotations
  - spec.selector.app
  - spec.selector.matchLabels.app
  - spec.selector.matchLabels.tier
  - spec.template.metadata.labels.app
  - spec.template.metadata.labels.tier
  - spec.template.metadata.labels.enviroment
  - spec.template.spec.containers[*].name
  - spec.template.spec.containers[*].image
  - spec.template.spec.containers[*].livenessProbe.initialDelaySeconds
  - spec.template.spec.containers[*].livenessProbe.periodSeconds
  - spec.template.spec.containers[*].readinessProbe.initialDelaySeconds
  - spec.template.spec.containers[*].readinessProbe.periodSeconds
  - spec.ports[*].name
  - roleRef.name
  - subjects[*].name
  - subjects[*].namespace


