apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      tier: api
  template:
    metadata:
      labels:
        app: webapp
        tier: api
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: api-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: api-nginx.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: api-nginx-config
          configMap:
            name: app-config
            items:
              - key: api-nginx.conf
                path: api-nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: api
spec:
  selector:
    app: webapp
    tier: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80