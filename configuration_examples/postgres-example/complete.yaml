apiVersion: v1
kind: Namespace
metadata:
  name: frontend-api-postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: frontend-api-postgres
data:
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: appdb
  DB_USER: appuser
  frontend-nginx.conf: |-
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /api/ {
        proxy_pass http://api-service:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }
  frontend-index.html: |-
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8" />
        <title>Frontend + API + PostgreSQL</title>
      </head>
      <body>
        <h1>Frontend</h1>
        <p>The frontend is exposed through the Ingress and proxies /api to the backend service.</p>
        <p><a href="/api/health">Check API health</a></p>
      </body>
    </html>
  api-nginx.conf: |-
    server {
      listen 80;
      server_name _;

      location /health {
        default_type text/plain;
        return 200 "api ok\n";
      }

      location / {
        default_type text/plain;
        return 200 "api service\n";
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: frontend-api-postgres
type: Opaque
stringData:
  DB_PASSWORD: ChangeMe123!
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: database
spec:
  clusterIP: None
  selector:
    app: webapp
    tier: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: database
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: webapp
      tier: database
  template:
    metadata:
      labels:
        app: webapp
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      tier: api
  template:
    metadata:
      labels:
        app: webapp
        tier: api
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: api-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: api-nginx.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: api-nginx-config
          configMap:
            name: app-config
            items:
              - key: api-nginx.conf
                path: api-nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: api
spec:
  selector:
    app: webapp
    tier: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      tier: frontend
  template:
    metadata:
      labels:
        app: webapp
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: frontend-nginx.conf
            - name: frontend-index
              mountPath: /usr/share/nginx/html/index.html
              subPath: frontend-index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: frontend-nginx-config
          configMap:
            name: app-config
            items:
              - key: frontend-nginx.conf
                path: frontend-nginx.conf
        - name: frontend-index
          configMap:
            name: app-config
            items:
              - key: frontend-index.html
                path: frontend-index.html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: frontend
spec:
  selector:
    app: webapp
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-api
  namespace: frontend-api-postgres
spec:
  podSelector:
    matchLabels:
      app: webapp
      tier: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: webapp
              tier: frontend
      ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgres
  namespace: frontend-api-postgres
spec:
  podSelector:
    matchLabels:
      app: webapp
      tier: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: webapp
              tier: api
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: frontend-api-postgres
spec:
  rules:
    - host: webapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80