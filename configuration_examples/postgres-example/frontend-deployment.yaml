apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      tier: frontend
  template:
    metadata:
      labels:
        app: webapp
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: frontend-nginx.conf
            - name: frontend-index
              mountPath: /usr/share/nginx/html/index.html
              subPath: frontend-index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: frontend-nginx-config
          configMap:
            name: app-config
            items:
              - key: frontend-nginx.conf
                path: frontend-nginx.conf
        - name: frontend-index
          configMap:
            name: app-config
            items:
              - key: frontend-index.html
                path: frontend-index.html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend-api-postgres
  labels:
    app: webapp
    tier: frontend
spec:
  selector:
    app: webapp
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80