# Allows only intra-namespace traffic and blocks any communication with pods from other namespaces 
# unless explicitly allowed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tenant1
spec:
  # Apply to all pods in this namespace
  podSelector: {}
  # Empty ingress and egress rules = deny all
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tenant2
spec:
  # Apply to all pods in this namespace
  podSelector: {}
  # Empty ingress and egress rules = deny all
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-frontend
  namespace: tenant2
spec:
  podSelector:
    matchLabels:
      app: hello
      tier: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-backend
  namespace: tenant2
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["hello"]
      - key: tier
        operator: In
        values: ["frontend", "backend"]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["hello"]
              - key: tier
                operator: In
                values: ["frontend", "backend"]
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["hello"]
              - key: tier
                operator: In
                values: ["frontend", "backend"]
      ports:
        - protocol: TCP
          port: 80