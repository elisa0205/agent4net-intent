apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant2
  namespace: tenant2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant2-role
  namespace: tenant2
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant2-role-binding
  namespace: tenant2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant2-role
subjects:
  - namespace: tenant2
    kind: ServiceAccount
    name: tenant2