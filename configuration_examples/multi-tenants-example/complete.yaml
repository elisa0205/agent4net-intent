apiVersion: v1
kind: Namespace
metadata:
  name: tenant1
  labels:
    environment: tenant1-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  namespace: tenant1
  labels:
    app: myapp
    environment: tenant1-dev
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
        environment: tenant1-dev
    spec:
      serviceAccountName: tenant1
      containers:
        - name: myapp-container
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: tenant1
  labels:
    app: myapp
    environment: tenant1-dev
spec:
  type: ClusterIP 
  selector:
    app: myapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant1
  namespace: tenant1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant1-role
  namespace: tenant1
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant1-role-binding
  namespace: tenant1
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant1-role
subjects:
  - namespace: tenant1
    kind: ServiceAccount
    name: tenant1
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant2
  labels:
    environment: tenant2-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tenant2
spec:
  selector:
    matchLabels:
      app: hello
      tier: backend
      track: stable
  replicas: 3
  template:
    metadata:
      labels:
        app: hello
        tier: backend
        track: stable
    spec:
      serviceAccountName: tenant2
      containers:
        - name: hello
          image: "gcr.io/google-samples/hello-go-gke:1.0"
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: tenant2
spec:
  selector:
    app: hello
    tier: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tenant2
spec:
  selector:
    app: hello
    tier: frontend
  ports:
  - protocol: "TCP"
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tenant2
spec:
  selector:
    matchLabels:
      app: hello
      tier: frontend
      track: stable
  replicas: 1
  template:
    metadata:
      labels:
        app: hello
        tier: frontend
        track: stable
    spec:
      serviceAccountName: tenant2
      containers:
        - name: nginx
          image: "gcr.io/google-samples/hello-frontend:1.0"
          lifecycle:
            preStop:
              exec:
                command: ["/usr/sbin/nginx","-s","quit"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant2
  namespace: tenant2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant2-role
  namespace: tenant2
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant2-role-binding
  namespace: tenant2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant2-role
subjects:
  - namespace: tenant2
    kind: ServiceAccount
    name: tenant2
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tenant1
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tenant2
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-frontend
  namespace: tenant2
spec:
  podSelector:
    matchLabels:
      app: hello
      tier: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-backend
  namespace: tenant2
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["hello"]
      - key: tier
        operator: In
        values: ["frontend", "backend"]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["hello"]
              - key: tier
                operator: In
                values: ["frontend", "backend"]
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["hello"]
              - key: tier
                operator: In
                values: ["frontend", "backend"]
      ports:
        - protocol: TCP
          port: 80
